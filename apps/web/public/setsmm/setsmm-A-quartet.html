<!DOCTYPE html>
<html lang="fa-IR" dir="rtl">
<head>
<meta charset="utf-8" />
<title>سرویس خواب — منوی A: کوارتت</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  @font-face {
    font-family: 'Ayandeh';
    font-weight: 400;
    src: url('/fonts/ayandeh-regular.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'Ayandeh';
    font-weight: 700;
    src: url('/fonts/ayandeh-bold.ttf') format('truetype');
    font-display: swap;
  }
  @font-face {
    font-family: 'Ayandeh';
    font-weight: 300;
    src: url('/fonts/ayandeh-light.ttf') format('truetype');
    font-display: swap;
  }

  :root {
    --ivory: #FAFAF7;
    --cream: #F5F0EB;
    --sand: #E8E0D8;
    --stone: #8C8279;
    --charcoal: #2C2825;
    --ink: #14110F;
    --forest: #5F7760;
    --gold: #C49A6C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: 'Ayandeh', 'Tahoma', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    line-height: 1.6;
  }

  /* ── Page chrome (just for visual context) ── */
  .stage {
    min-height: 100vh;
    background: linear-gradient(180deg, var(--cream) 0%, #ede5db 100%);
    padding-bottom: 60px;
  }

  .stage-label {
    text-align: center;
    padding: 24px 0 8px;
    color: var(--stone);
    font-size: 0.78rem;
    letter-spacing: 0.16em;
  }
  .stage-label strong { color: var(--charcoal); font-weight: 700; }

  /* Fake navbar */
  .nav {
    position: relative;
    height: 60px;
    background: var(--ivory);
    border-bottom: 1px solid var(--sand);
    display: flex;
    align-items: center;
    margin-top: 12px;
  }
  .nav-inner {
    max-width: 1440px;
    margin: 0 auto;
    width: 100%;
    padding: 0 32px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
  }
  .nav-logo {
    height: 20px;
    display: flex;
    align-items: center;
  }
  .nav-logo svg { height: 100%; width: auto; }
  .nav-list {
    display: flex;
    gap: 28px;
    list-style: none;
    color: var(--stone);
    font-size: 0.94rem;
  }
  .nav-list a { text-decoration: none; color: inherit; }
  .nav-list .active {
    color: var(--charcoal);
    font-weight: 700;
    border-bottom: 1.5px solid var(--forest);
    padding-bottom: 2px;
  }
  .nav-icons {
    justify-self: end;
    display: flex;
    gap: 4px;
    color: var(--stone);
  }
  .nav-icons span {
    width: 32px; height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  /* ── DROPDOWN PANEL — variant A: Quartet ─────────────────── */
  .panel {
    background: var(--ivory);
    border-top: 1px solid var(--sand);
    border-bottom: 1px solid var(--sand);
    box-shadow: 0 16px 32px rgba(20, 17, 15, 0.06);
  }
  .panel-inner {
    max-width: 1440px;
    margin: 0 auto;
    padding: 56px 32px 64px;
  }

  .panel-eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    color: var(--forest);
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
  }
  .panel-title {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--charcoal);
    margin-bottom: 40px;
  }
  .panel-title em {
    font-style: normal;
    font-weight: 700;
  }

  .quartet {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .card {
    position: relative;
    aspect-ratio: 3 / 4;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    background: var(--cream);
    transition: transform 600ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .card:hover { transform: translateY(-3px); }

  .card-media {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 800ms cubic-bezier(0.22, 1, 0.36, 1);
  }
  .card:hover .card-media { transform: scale(1.04); }

  .card-media::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, transparent 40%, rgba(20, 17, 15, 0.70) 100%);
  }

  .card-content {
    position: absolute;
    inset-inline-start: 22px;
    inset-block-end: 24px;
    z-index: 1;
    color: var(--ivory);
  }
  .card-num {
    font-size: 0.74rem;
    letter-spacing: 0.20em;
    color: rgba(232, 224, 216, 0.7);
    margin-bottom: 6px;
  }
  .card-name {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 0.82rem;
    color: rgba(232, 224, 216, 0.85);
  }

  /* ── footer CTA strip ── */
  .footer {
    text-align: center;
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--sand);
  }
  .cta-link {
    color: var(--charcoal);
    font-weight: 700;
    text-decoration: none;
    border-bottom: 1px solid var(--charcoal);
    padding-bottom: 2px;
    font-size: 0.95rem;
  }
  .cta-link:hover { color: var(--forest); border-color: var(--forest); }
</style>
</head>
