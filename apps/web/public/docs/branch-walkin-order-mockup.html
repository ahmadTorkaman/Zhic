<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ژیک — میز کار شعبه · سفارش جدید (mockup)</title>
<style>
  @font-face{font-family:'Ayandeh';src:url('/fonts/ayandeh-light.ttf')   format('truetype');font-weight:300;font-display:swap;}
  @font-face{font-family:'Ayandeh';src:url('/fonts/ayandeh-regular.ttf') format('truetype');font-weight:400;font-display:swap;}
  @font-face{font-family:'Ayandeh';src:url('/fonts/ayandeh-bold.ttf')    format('truetype');font-weight:700;font-display:swap;}
  @font-face{font-family:'Ayandeh';src:url('/fonts/ayandeh-black.ttf')   format('truetype');font-weight:900;font-display:swap;}
  :root{--ivory:#FAFAF7;--cream:#F5F0EB;--sand:#E8E0D8;--stone:#8C8279;--charcoal:#2C2825;--ink:#14110F;--forest:#5F7760;--gold:#C49A6C;--ease:cubic-bezier(0.22,1,0.36,1);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Ayandeh',system-ui,sans-serif;background:var(--ivory);color:var(--charcoal);}

  .top{display:flex;align-items:center;gap:16px;padding:12px clamp(16px,3vw,32px);background:#fff;border-block-end:1px solid var(--sand);position:sticky;top:0;z-index:20;}
  .brand{font-weight:900;font-size:1.3rem;color:var(--ink);}
  .brand::after{content:'';display:block;height:2px;width:60%;background:var(--forest);margin-top:1px;border-radius:2px;}
  .ws{font-weight:700;font-size:.95rem;color:var(--ink);}
  .ctx{display:flex;align-items:center;gap:7px;color:var(--stone);font-size:.82rem;}
  .ctx .pin{width:7px;height:7px;border-radius:50%;background:var(--forest);}
  .spacer{flex:1;}
  .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:.8rem;color:#fff;background:var(--forest);}

  .wrap{max-width:1180px;margin:0 auto;padding:18px clamp(16px,3vw,32px) 60px;}
  .crumb{font-size:.8rem;color:var(--stone);margin-bottom:6px;}
  h1{font-size:1.5rem;font-weight:900;color:var(--ink);letter-spacing:-.02em;}
  .from-lead{display:inline-flex;align-items:center;gap:7px;margin-top:8px;background:color-mix(in srgb,var(--forest) 10%,#fff);border:1px solid color-mix(in srgb,var(--forest) 30%,var(--sand));color:var(--forest);font-size:.76rem;border-radius:999px;padding:5px 12px;}

  .grid{display:grid;grid-template-columns:1fr 360px;gap:22px;margin-top:18px;align-items:start;}
  @media(max-width:900px){.grid{grid-template-columns:1fr;}}

  .panel{background:#fff;border:1px solid var(--sand);border-radius:14px;padding:16px;}
  .panel + .panel{margin-top:16px;}
  .panel h2{font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);margin-bottom:12px;}

  .cust{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .cust .who{font-weight:700;color:var(--ink);}
  .cust .ph{direction:ltr;color:var(--stone);font-size:.84rem;font-variant-numeric:tabular-nums;}
  .ghost{border:1px solid var(--sand);background:#fff;color:var(--charcoal);border-radius:999px;padding:6px 13px;font:inherit;font-size:.76rem;cursor:pointer;transition:.15s var(--ease);}
  .ghost:hover{border-color:var(--forest);color:var(--forest);}

  .search{display:flex;gap:8px;}
  .search input{flex:1;border:1px solid var(--sand);border-radius:10px;padding:10px 12px;font:inherit;font-size:.9rem;background:var(--ivory);}
  .search input:focus{outline:2px solid color-mix(in srgb,var(--forest) 45%,transparent);outline-offset:1px;}
  .results{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .res{border:1px dashed var(--sand);background:var(--ivory);border-radius:10px;padding:8px 11px;cursor:pointer;font-size:.8rem;display:flex;flex-direction:column;gap:2px;transition:.15s var(--ease);}
  .res:hover{border-color:var(--forest);border-style:solid;}
  .res b{color:var(--ink);font-weight:700;}
  .res span{color:var(--stone);font-size:.72rem;}

  .line{display:grid;grid-template-columns:1fr auto;gap:10px;padding:13px 0;border-block-end:1px solid var(--sand);}
  .line:last-child{border-block-end:0;}
  .line .nm{font-weight:700;color:var(--ink);font-size:.94rem;}
  .chips{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
  .vchip{font-size:.68rem;background:var(--cream);border:1px solid var(--sand);border-radius:999px;padding:2px 9px;color:var(--charcoal);}
  .unit{color:var(--stone);font-size:.76rem;margin-top:6px;font-variant-numeric:tabular-nums;}
  .line .right{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;gap:8px;}
  .qty{display:inline-flex;align-items:center;border:1px solid var(--sand);border-radius:999px;overflow:hidden;}
  .qty button{border:0;background:#fff;width:28px;height:28px;cursor:pointer;font:inherit;font-size:1rem;color:var(--charcoal);}
  .qty button:hover{background:var(--cream);}
  .qty span{min-width:30px;text-align:center;font-variant-numeric:tabular-nums;font-weight:700;}
  .ltot{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
  .rm{border:0;background:none;color:var(--stone);cursor:pointer;font-size:.72rem;}
  .rm:hover{color:#B4654A;}

  .sum{position:sticky;top:80px;}
  .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:.9rem;}
  .row .v{font-variant-numeric:tabular-nums;}
  .row.muted{color:var(--stone);font-size:.84rem;}
  .total{border-block-start:1px solid var(--sand);margin-top:8px;padding-top:12px;}
  .total .lbl{font-weight:700;color:var(--ink);}
  .total .v{font-weight:900;font-size:1.45rem;color:var(--ink);font-variant-numeric:tabular-nums;}
  .toman{font-size:.7rem;color:var(--stone);font-weight:400;}
  .dep{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px;}
  .dep input{width:130px;border:1px solid var(--sand);border-radius:8px;padding:7px 10px;font:inherit;text-align:left;direction:ltr;font-variant-numeric:tabular-nums;background:var(--ivory);}
  .cta{display:block;width:100%;border:0;background:var(--forest);color:#fff;border-radius:10px;padding:13px;font:inherit;font-weight:700;font-size:.95rem;cursor:pointer;margin-top:14px;transition:.15s var(--ease);}
  .cta:hover{background:#4e6450;}
  .cta2{display:block;width:100%;border:1px solid var(--sand);background:#fff;color:var(--charcoal);border-radius:10px;padding:11px;font:inherit;font-size:.86rem;cursor:pointer;margin-top:9px;}
  .note{font-size:.72rem;color:var(--stone);margin-top:11px;line-height:1.6;text-align:center;}
</style>
</head>
<body>
<div class="top">
  <div class="brand">ژیک</div>
  <div class="ws">میز کار شعبه</div>
  <div class="ctx"><span class="pin"></span> شعبه قم</div>
  <div class="spacer"></div>
  <div class="avatar">س</div>
</div>

<div class="wrap">
  <div class="crumb">میز کار · لیدها · سفارش جدید</div>
  <h1>سفارش جدید</h1>
  <div class="from-lead">↩ ساخته‌شده از لید موفق: نگار موسوی</div>

  <div class="grid">
    <div>
      <div class="panel">
        <h2>مشتری</h2>
        <div class="cust">
          <div><div class="who">نگار موسوی</div><div class="ph">0901 556 7788</div></div>
          <button class="ghost">تغییر مشتری</button>
        </div>
      </div>

      <div class="panel">
        <h2>افزودن محصول</h2>
        <div class="search"><input id="q" placeholder="جستجوی محصول… (مثلاً پارلا)" /><button class="ghost" onclick="document.getElementById('q').focus()">جستجو</button></div>
        <div class="results" id="results"></div>
      </div>

      <div class="panel">
        <h2>اقلام سفارش</h2>
        <div id="lines"></div>
      </div>
    </div>

    <div class="panel sum">
      <h2>خلاصه سفارش</h2>
      <div class="row"><span>جمع اقلام</span><span class="v" id="subtotal">—</span></div>
      <div class="row muted"><span>تخفیف</span><span class="v">۰</span></div>
      <div class="row total"><span class="lbl">مبلغ نهایی</span><span class="v" id="total">—</span></div>
      <div class="toman" style="text-align:left">تومان</div>
      <div class="dep"><span>بیعانه</span><input id="deposit" value="0" /></div>
      <div class="row muted"><span>مانده</span><span class="v" id="remaining">—</span></div>
      <button class="cta">ثبت سفارش</button>
      <button class="cta2">ذخیره پیش‌نویس</button>
      <div class="note">فاکتور رسمی پس از ثبت سفارش صادر می‌شود. شعبه: قم · کانال: حضوری</div>
    </div>
  </div>
</div>

<script>
  var FA='۰۱۲۳۴۵۶۷۸۹';
  function fa(n){return String(n).replace(/[0-9]/g,function(d){return FA[+d];});}
  function money(n){return fa(n.toLocaleString('en-US'));}

  var CATALOG=[
    {id:'parla-bed', nm:'پارلا — تخت دونفره', v:['سایز ۱۶۰','گردو'], price:48000000},
    {id:'parla-night', nm:'پارلا — پاتختی',   v:['گردو'],          price:8500000},
    {id:'caroline-vanity', nm:'کارولین — میز آرایش', v:['آینه‌دار'], price:21000000},
    {id:'elizabeth-dresser', nm:'الیزابت — دراور', v:['۶ کشو'],     price:17500000},
    {id:'mocha-wardrobe', nm:'موکا — کمد', v:['۳ درب','کرم'],       price:62000000}
  ];
  // start with the item from the won lead
  var CART=[{id:'caroline-bed', nm:'کارولین — تخت دونفره', v:['سایز ۱۶۰','گردو'], price:48000000, qty:1}];

  function renderResults(){
    document.getElementById('results').innerHTML=CATALOG.map(function(p){
      return '<div class="res" onclick="add(\''+p.id+'\')"><b>'+p.nm+'</b><span>'+money(p.price)+' ت · '+p.v.join(' · ')+'</span></div>';
    }).join('');
  }
  window.add=function(id){var p=CATALOG.find(function(x){return x.id===id;});var ex=CART.find(function(x){return x.id===id;});if(ex)ex.qty++;else CART.push({id:p.id,nm:p.nm,v:p.v,price:p.price,qty:1});render();};
  window.step=function(i,d){CART[i].qty=Math.max(1,CART[i].qty+d);render();};
  window.rm=function(i){CART.splice(i,1);render();};

  function render(){
    document.getElementById('lines').innerHTML=CART.map(function(l,i){
      return '<div class="line"><div><div class="nm">'+l.nm+'</div>'
        +'<div class="chips">'+l.v.map(function(x){return '<span class="vchip">'+x+'</span>';}).join('')+'</div>'
        +'<div class="unit">'+money(l.price)+' ت / واحد</div></div>'
        +'<div class="right"><div class="qty"><button onclick="step('+i+',-1)">−</button><span>'+fa(l.qty)+'</span><button onclick="step('+i+',1)">+</button></div>'
        +'<div class="ltot">'+money(l.price*l.qty)+'</div>'
        +'<button class="rm" onclick="rm('+i+')">حذف</button></div></div>';
    }).join('') || '<div style="color:var(--stone);font-size:.85rem;padding:8px 0">هنوز کالایی اضافه نشده.</div>';
    var sub=CART.reduce(function(s,l){return s+l.price*l.qty;},0);
    var dep=parseInt((document.getElementById('deposit').value||'0').replace(/\D/g,''))||0;
    document.getElementById('subtotal').textContent=money(sub);
    document.getElementById('total').textContent=money(sub);
    document.getElementById('remaining').textContent=money(Math.max(0,sub-dep));
  }
  document.getElementById('deposit').addEventListener('input',render);
  renderResults();render();
</script>
</body>
</html>
