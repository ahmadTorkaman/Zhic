<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ژیک — logo motion</title>
<style>
  :root{font-family:ui-sans-serif,system-ui,sans-serif}
  body{margin:0;background:#2a2724;color:#E8E2D8;display:flex;flex-direction:column;align-items:center;gap:28px;padding:48px 16px}
  h1{font-weight:600;letter-spacing:.06em;font-size:15px;text-transform:uppercase;color:#C2986B;margin:0}
  .row{display:flex;flex-wrap:wrap;gap:28px;justify-content:center;width:100%;max-width:1100px}
  .card{border-radius:8px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.4);position:relative}
  .card img{display:block;width:520px;max-width:90vw;height:auto}
  .checker{background:#fff;background-image:linear-gradient(45deg,#ccc 25%,transparent 25%),linear-gradient(-45deg,#ccc 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ccc 75%),linear-gradient(-45deg,transparent 75%,#ccc 75%);background-size:28px 28px;background-position:0 0,0 14px,14px -14px,-14px 0}
  .tag{position:absolute;top:12px;left:12px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;background:rgba(0,0,0,.35);color:#fff;padding:4px 9px;border-radius:99px;backdrop-filter:blur(6px)}
  button{cursor:pointer;background:#C2986B;color:#1a1714;border:0;border-radius:99px;padding:10px 20px;font-weight:600;letter-spacing:.04em}
  small{color:#8a847a}
</style></head>
<body>
  <h1>ژیک · logo motion — draw-on + gold sweep</h1>
  <div class="row">
    <div class="card"><span class="tag">light</span><img id="l" src="zhic-logo-motion-light.gif"></div>
    <div class="card"><span class="tag">dark</span><img id="d" src="zhic-logo-motion-dark.gif"></div>
    <div class="card checker"><span class="tag">transparent</span><img id="t" src="zhic-logo-motion-transparent.gif"></div>
  </div>
  <button onclick="for(const i of[l,d,t]){const s=i.src.split('?')[0];i.src=s+'?'+Date.now()}">↻ replay all</button>
  <small>3.2s seamless loop · 760×480 · forest mark, caramel as the earned accent</small>
</body></html>
