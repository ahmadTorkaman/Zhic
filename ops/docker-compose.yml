# docker-compose.yml — long-running services for Zhic
#
# Postgres always runs. Plausible + Gitea are opt-in via profiles.
#
# Usage:
#   docker compose up -d                                  # just postgres
#   docker compose --profile analytics up -d              # + plausible
#   docker compose --profile analytics --profile git up -d  # everything
#
# The web + api (Next.js) processes run as systemd services, not here.
# See /etc/systemd/system/zhic-{web,api}.service

name: zhic

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zhic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-zhic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Only bind to localhost — systemd services reach it via 127.0.0.1:5432
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zhic}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Optional: self-hosted analytics ────────────────────────────
  plausible_db:
    image: postgres:16-alpine
    profiles: [analytics]
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${PLAUSIBLE_SECRET_KEY_BASE}
    volumes:
      - plausible_pgdata:/var/lib/postgresql/data

  plausible_events_db:
    image: clickhouse/clickhouse-server:24-alpine
    profiles: [analytics]
    restart: unless-stopped
    volumes:
      - plausible_eventdata:/var/lib/clickhouse
      - ./plausible/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./plausible/clickhouse-user-config.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.4
    profiles: [analytics]
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    depends_on:
      - plausible_db
      - plausible_events_db
    ports:
      - '127.0.0.1:8000:8000'
    environment:
      BASE_URL: ${PLAUSIBLE_BASE_URL}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DATABASE_URL: postgres://postgres:${PLAUSIBLE_SECRET_KEY_BASE}@plausible_db:5432/plausible_db
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible_events_db

  # ── Optional: Gitea (production side only) ─────────────────────
  gitea:
    image: gitea/gitea:1.22-rootless
    profiles: [git]
    restart: unless-stopped
    environment:
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL}
      GITEA__server__SSH_DOMAIN: git.zhicwood.com
      GITEA__server__SSH_PORT: 222
      GITEA__service__DISABLE_REGISTRATION: 'true'
      GITEA__service__REQUIRE_SIGNIN_VIEW: 'false'
    volumes:
      - gitea_data:/var/lib/gitea
      - gitea_config:/etc/gitea
    ports:
      - '127.0.0.1:3300:3000'   # Gitea web (Caddy proxies to this)
      - '222:2222'               # SSH for git clone (public)

volumes:
  pgdata:
  plausible_pgdata:
  plausible_eventdata:
  gitea_data:
  gitea_config:
